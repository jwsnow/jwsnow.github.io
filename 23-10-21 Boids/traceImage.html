//Gaussian Blur code
var blurSD=5;
var blurR=3*blurSD;
var blurN=2*blurR+1;
var blurMask=[];
function setupBlur(s){
	blurSD=s;
	blurR=3*blurSD;
	blurN=2*blurR+1;
	blurMask=[];
	
	var i;
	var c=0;
	var f=1/sqrt(2*pi*s*s);
	var exponentCoef=-1/(2*s*s);
	for (i=-blurR;i<=blurR;i++){
		blurMask[i+blurR]=(f*exp(exponentCoef*i*i));
		c+=blurMask[i+blurR];
	}
}
function gBlur(A){
	var w=A.length;
	var h=A[0].length;
	var T=[];
	var x,y,i,j,a,X,Y,t;
	
	for (x=0;x<w;x++){
		T[x]=[];
		for (y=0;y<h;y++){
			T[x][y]=0;
			a=0;
			for (i=-blurR;i<=blurR;i++){
				X=x+i;
				if ((0<=X) && (X<w)){
					t=blurMask[i+blurR];
					a+=t;
					T[x][y]+=t*A[X][y];
				}
			}
			T[x][y]=T[x][y]/a;
		}
	}
	for (x=0;x<w;x++){
		for (y=0;y<h;y++){
			A[x][y]=0;
			a=0;
			for (i=-blurR;i<=blurR;i++){
				Y=y+i;
				if ((0<=Y) && (Y<h)){
					t=blurMask[i+blurR];
					a+=t;
					A[x][y]+=t*T[x][Y];
				}
			}
			A[x][y]=A[x][y]/a;
		}
	}	
}
//end Gaussian Blur Code



//GRADIENT CODE
function setupGradient(G, VX, VY, V){
	//input an image G and calculate gradient or tangent vectors
	//VX and VY are unit vectors
	//magnitude is in V
	
	//setup vectors
	var w=G.length;
	var h=G[0].length;
	var x,y,dx,dy,mind,d,mini;
	var maxv=0;
	for (x=0;x<w;x++){
		V[x]=[];
		VX[x]=[];
		VY[x]=[];
		for (y=0;y<h;y++){
			VX[x][y]=0;
			VY[x][y]=0;
			V[x][y]=0;
		}
	}
	//find gradient
	for (x=1;x<w-1;x++)
	for (y=1;y<h-1;y++){
			VX[x][y]=-G[x-1][y-1]-2*G[x-1][y]-G[x-1][y+1]+G[x+1][y-1]+2*G[x+1][y]+G[x+1][y+1];
			VY[x][y]=-G[x-1][y-1]-2*G[x][y-1]-G[x+1][y-1]+G[x-1][y+1]+2*G[x][y+1]+G[x+1][y+1];
			V[x][y]=sqrt(VX[x][y]*VX[x][y]+VY[x][y]*VY[x][y]);
			//convert to tangent	
			dx=VX[x][y];
			VX[x][y]=-VY[x][y];
			VY[x][y]=dx;
			//normalize
			d=V[x][y];
			if (d>maxv) maxv=d;
			if (d!=0)
			{
				VX[x][y]=VX[x][y]/d;
				VY[x][y]=VY[x][y]/d;
			}
	}
//	for (x=1;x<w-1;x++)
//	for (y=1;y<h-1;y++){
//		VX[x][y]=VX[x][y]/maxv;
//		VY[x][y]=VY[x][y]/maxv;
//	}
}

//lerp stuff

function lerp(a,b,t){
	return(t*b+(1-t)*a);
}
function lerpArray(a,x,y){
var ox=x;
var oy=y;
	var width=a.length;
	var height=a[0].length;
	var X, Y, X1, Y1;
	var a1, a2,r;
	if (x<0) x=0;
	else if (x>=width-1){
		x=width-1;
		X=width-1;
		X1=width-1;
	}
	else{
		X=floor(x);
		X1=X+1;
	}
	if (y<0) y=0;
	else if (y>=height-1){
		y=height-1;
		Y=height-1;
		Y1=height-1;
	}
	else{
		Y=floor(y);
		Y1=Y+1;
	}
	x=x-X;
	y=y-Y	
	
	a1=lerp(a[X][Y],a[X1][Y],x);
	a2=lerp(a[X][Y1], a[X1][Y1],x);

	r=(lerp(a1,a2,y));
	return(r);
}
//end lerp stuff

function avoidEnvironment(){
	var i;
	var x,y,tx,ty,dx,dy,v;
	var h, a,v,b,dt;
	var lx, ly, rx, ry, cx, cy;
	var lt, ct, rt

		v=V[i];
		if (v>0){

			y=Y[i];;
			dx=VX[i];
			dy=VY[i];			
			dx=dx/v;
			dy=dy/v;

			lx=round(x+COS(h-fovAngle)*safeDistance);
			ly=round(y+SIN(h-fovAngle)*safeDistance);
			cx=round(x+COS(h)*safeDistance);
			cy=round(y+SIN(h)*safeDistance);
			rx=round(x+COS(h+fovAngle)*safeDistance);
			ry=round(y+SIN(h+fovAngle)*safeDistance);
//			console.log(i,x.toFixed(2),y.toFixed(2),dx.toFixed(2),dy.toFixed(2),v.toFixed(2));
//			console.log(lx.toFixed(2),ly.toFixed(2),cx.toFixed(2),cy.toFixed(2),rx.toFixed(2),ry.toFixed(2));
			lt=((lx<0)||(lx>=width)||(ly<0)||(ly>=height)||(ENV[lx][ly]<255));
			rt=((rx<0)||(rx>=width)||(ry<0)||(ry>=height)||(ENV[rx][ry]<255));
			ct=((cx<0)||(cx>=width)||(cy<0)||(cy>=height)||(ENV[cx][cy]<255));
			tx=(ENV[round(x)][round(y)]<255)
			if ((lt)||(ct)||(rt)){
					{
					a=fovAngle;
					xt=round(x+COS(a+h)*safeDistance);
					yt=round(y+SIN(a+h)*safeDistance);
					while((xt<0)||(xt>=width)||(yt<0)||(yt>=height)||(ENV[xt][yt]<255)){
						a++;
						xt=round(x+COS(a+h)*safeDistance);
						yt=round(y+SIN(a+h)*safeDistance)	;			
					}				
					b=-fovAngle;
					xt=round(x+COS(b+h)*safeDistance);
					yt=round(y+SIN(b+h)*safeDistance);
					while((xt<0)||(xt>=width)||(yt<0)||(yt>=height)||(ENV[xt][yt]<255)){
						b--;
						xt=round(x+COS(b+h)*safeDistance);
						yt=round(y+SIN(b+h)*safeDistance);			
					}				
					if (a<abs(b)) 
						dt=a;
					else dt=b;
				}
			
				VX[i]=v*COS(h+dt);
				VY[i]=v*SIN(h+dt);
			}
		}
	}	
}

function forceGradient(d, R){
	var x=(R-d)/R;
	return(3*x*x-2*x*x*x);
}
function neighborInfluence(){
	 var i,j,n;
	 var dx,dy,d,dot;
	 
	 for (i=0;i<N;i++){
		NN[i]=1;
		NX[i]=X[i];
		NY[i]=Y[i];
		NVX[i]=VX[i];
		NVY[i]=VY[i];
		NFX[i]=0;
		NFY[i]=0;
	 }
	 
	 for (i=0;i<N;i++){
		//if ((i%10)!=0)
		for (j=0;j<N;j++){
			dx=X[j]-X[i];
			dy=Y[j]-Y[i];
			d=sqrt(dx*dx+dy*dy);
			dot=dx*VX[i]+dy*VY[i];
			if ((d<NR) && (dot/(V[i]*d)>0.5)){
				NN[i]++;
				//NN[j]++;
				NX[i]+=X[j];
				NY[i]+=Y[j];
				//NX[j]+=X[i];
				//NY[j]+=Y[i];
				NVX[i]+=VX[j];
				NVY[i]+=VY[j];
				//NVX[j]+=VX[i];
				//NVY[j]+=VY[i];
			}
		}
	 }
	 for (i=0;i<N;i++){
		for (j=i+1;j<N;j++){
			dx=X[j]-X[i];
			dy=Y[j]-Y[i];
			d=sqrt(dx*dx+dy*dy);
				if ((d>0) && (d<R)){
					dx=dx/d;
					dy=dy/d;
					NFX[i]+=-forceGradient(d,R)*dx;
					NFY[i]+=-forceGradient(d,R)*dy;
					NFX[j]+=forceGradient(d,R)*dx;
					NFY[j]+=forceGradient(d,R)*dy;
				}
		}
	 }
	 for (i=0;i<N;i++){
		n=NN[i];
		if (n>0){
			NX[i]=NX[i]/n;
			NY[i]=NY[i]/n;
			NVX[i]=NVX[i]/n;
			NVY[i]=NVY[i]/n;
		}
	 }
	 
}

function updatePositions(){
	var i;
	for (i=0;i<N;i++){
		X[i]+=DT*VX[i];
		Y[i]+=DT*VY[i];
	}
}
function findVelocities(){
	var i,dx,dy;
	for (i=0;i<N;i++){
		dx=VX[i];
		dy=VY[i];
		V[i]=sqrt(dx*dx+dy*dy);
	}
}
function updateForces(){
	var i;
	var dx,dy,d,k;
	for (i=0;i<N;i++){
		//a=noise(X[i]/width, Y[i]/height)*360;
		FX[i]=repCon*NFX[i]//+lerpArray(IVX, X[i], Y[i]);
		FY[i]=repCon*NFY[i]//+lerpArray(IVX, X[i], Y[i]);
	}
	for (i=0;i<N;i++){
		dx=NX[i]-X[i];
		dy=NY[i]-Y[i];
		d=sqrt(dx*dx+dy*dy);
		k=attCon*forceGradient(d,NR);
		FX[i]+=k*dx+followCon*(NVX[i]-VX[i]);
		FY[i]+=k*dy+followCon*(NVY[i]-VY[i]);
	}
}
function updateAccelerations(){
	var i;
	for (i=0;i<N;i++){
		AX[i]=FX[i];
		AY[i]=FY[i];
	}
}
function updateVelocities(){
	var i;
	for (i=0;i<N;i++){
		VX[i]=VX[i]+DT*AX[i];
		VY[i]=VY[i]+DT*AY[i];
	}
	findVelocities();
}
function capVelocities(){
	var i,v,dx,dy;
	for (i=0;i<N;i++){
		v=V[i];
		//if (v>vCap)
		{
			dx=VX[i]/v;
			dy=VY[i]/v;
			VX[i]=dx*vCap;
			VY[i]=dy*vCap;
		}
	}
}

	neighborInfluence();
	updateForces();
	updateAccelerations();
	updateVelocities();
	capVelocities();
	avoidEnvironment();
	updatePositions();
}
